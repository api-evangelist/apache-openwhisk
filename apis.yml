aid: apache-openwhisk
name: Apache OpenWhisk
description: >-
  Apache OpenWhisk is an open-source serverless cloud platform that executes functions in response to events at any scale. It supports multiple programming languages and provides a rich programming model
  for creating serverless APIs and event-driven applications.
type: Index
position: Consumer
