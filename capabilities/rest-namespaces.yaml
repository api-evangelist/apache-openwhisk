naftiko: 1.0.0-alpha2
info:
  label: Apache OpenWhisk REST API — Namespaces
  description: 'Apache OpenWhisk REST API — Namespaces. 3 operations. Lead operation: Apache OpenWhisk List Namespaces. Self-contained
    Naftiko capability covering one Apache Openwhisk business surface.'
  tags:
  - Apache Openwhisk
  - Namespaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_OPENWHISK_API_KEY: APACHE_OPENWHISK_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-namespaces
    baseUri: https://{host}/api/v1
    description: Apache OpenWhisk REST API — Namespaces business capability. Self-contained, no shared references.
    resources:
    - name: namespaces
      path: /namespaces
      operations:
      - name: listnamespaces
        method: GET
        description: Apache OpenWhisk List Namespaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: namespaces-namespace
      path: /namespaces/{namespace}
      operations:
      - name: getnamespace
        method: GET
        description: Apache OpenWhisk Get Namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: namespaces-namespace-limits
      path: /namespaces/{namespace}/limits
      operations:
      - name: getnamespacelimits
        method: GET
        description: Apache OpenWhisk Get Namespace Limits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.APACHE_OPENWHISK_USER}}'
      password: '{{env.APACHE_OPENWHISK_PASS}}'
  exposes:
  - type: rest
    namespace: rest-namespaces-rest
    port: 8080
    description: REST adapter for Apache OpenWhisk REST API — Namespaces. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/namespaces
      name: namespaces
      description: REST surface for namespaces.
      operations:
      - method: GET
        name: listnamespaces
        description: Apache OpenWhisk List Namespaces
        call: rest-namespaces.listnamespaces
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/namespaces/{namespace}
      name: namespaces-namespace
      description: REST surface for namespaces-namespace.
      operations:
      - method: GET
        name: getnamespace
        description: Apache OpenWhisk Get Namespace
        call: rest-namespaces.getnamespace
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/namespaces/{namespace}/limits
      name: namespaces-namespace-limits
      description: REST surface for namespaces-namespace-limits.
      operations:
      - method: GET
        name: getnamespacelimits
        description: Apache OpenWhisk Get Namespace Limits
        call: rest-namespaces.getnamespacelimits
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-namespaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache OpenWhisk REST API — Namespaces. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apache-openwhisk-list-namespaces
      description: Apache OpenWhisk List Namespaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-namespaces.listnamespaces
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-openwhisk-get-namespace
      description: Apache OpenWhisk Get Namespace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-namespaces.getnamespace
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-openwhisk-get-namespace-limits
      description: Apache OpenWhisk Get Namespace Limits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-namespaces.getnamespacelimits
      outputParameters:
      - type: object
        mapping: $.
