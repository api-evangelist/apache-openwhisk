naftiko: "1.0.0-alpha1"

info:
  label: "Apache OpenWhisk REST API"
  description: "Apache OpenWhisk serverless platform REST API for managing actions, triggers, rules, packages, and activations."
  tags:
    - Apache OpenWhisk
    - Serverless
    - Functions As A Service
    - Event Driven
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      OPENWHISK_AUTH: OPENWHISK_AUTH

capability:
  consumes:
    - type: http
      namespace: openwhisk
      baseUri: https://localhost:443/api/v1
      description: "Apache OpenWhisk REST API"
      authentication:
        type: basic
        username: "{{OPENWHISK_AUTH_USER}}"
        password: "{{OPENWHISK_AUTH_PASS}}"
      resources:
        - name: actions
          path: /namespaces/{namespace}/actions
          description: "Serverless function actions"
          operations:
            - name: listActions
              method: GET
              description: "List all actions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: invokeAction
              method: POST
              description: "Invoke an action"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: triggers
          path: /namespaces/{namespace}/triggers
          description: "Event triggers"
          operations:
            - name: listTriggers
              method: GET
              description: "List all triggers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: activations
          path: /namespaces/{namespace}/activations
          description: "Action activations history"
          operations:
            - name: listActivations
              method: GET
              description: "List activations"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
  exposes:
    - type: rest
      port: 8100
      namespace: openwhisk-rest
      resources:
        - path: /v1/actions
          name: actions
          description: "Actions management"
          operations:
            - method: GET
              name: list-actions
              description: "List all actions"
              call: "openwhisk.listActions"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9100
      namespace: openwhisk-mcp
      transport: http
      tools:
        - name: list-actions
          description: "List all serverless actions"
          hints:
            readOnly: true
          call: "openwhisk.listActions"
          outputParameters:
            - type: object
              mapping: "$."
